# Run: pre-commit install && pre-commit install --hook-type pre-push
# Then: pre-commit run --all-files  (first time)

repos:
  # --- Ruff: Lint + Format on commit ---
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.10   # pin to a known good version
    hooks:
      - id: ruff
        name: ruff (lint)
        args: [--fix, --exit-non-zero-on-fix]
        stages: [commit]
      - id: ruff-format
        name: ruff (format)
        stages: [commit]

  # --- Pytest: run on push (keeps commits fast) ---
  - repo: local
    hooks:
      - id: pytest
        name: pytest (unit tests)
        entry: pytest -q
        language: system
        pass_filenames: false
        stages: [push]

  # --- Quality-of-life fixes on commit (optional but helpful) ---
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: end-of-file-fixer
        stages: [commit]
      - id: trailing-whitespace
        stages: [commit]
